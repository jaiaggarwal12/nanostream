services:
  - type: web
    name: nanostream-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: nanostream-redis
          property: connectionString
      - key: B2_KEY_ID
        sync: false
      - key: B2_APPLICATION_KEY
        sync: false
      - key: B2_BUCKET
        value: nanostream
      - key: B2_ENDPOINT
        sync: false
      - key: B2_PUBLIC_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info

  - type: redis
    name: nanostream-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
